<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
        <script type="module" src="/index.js"></script>
    </head>
    <body>
        <div class="container">
            <div>
                <h3 id="title">HOME</h3>
                <div class="card">
                    <h3 class="text-card" id="home-el">0</h3>
                </div>
                <button class="btn" onclick="add1ButtonHome()">+1</button>
                <button class="btn" onclick="add2ButtonHome()">+2</button>
                <button class="btn" onclick="add3ButtonHome()">+3</button>
            </div>
            <div>
                <h3 id="second-title">GUEST</h3>
                <div>
                <div class="card">
                    <h3 class="text-card" id="guest-el">0</h3>
                </div>
                <button class="btn" onclick="add1ButtonGuest()">+1</button>
                <button class="btn" onclick="add2ButtonGuest()">+2</button>
                <button class="btn" onclick="add3ButtonGuest()">+3</button>
            </div>
            <button class="btn-new" onclick="newGame()">New Game</button>
                
            </div>
        </div>
        
    </body>
</html>
